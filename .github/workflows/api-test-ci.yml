name: Webapp API Test CI

on:
  pull_request:
    branches:
      - main

jobs:
  api-test:
    name: Setup WebApp and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip the repo
        run: |
          cd ..
          zip -r /tmp/lakshman_siva_repo.zip "$(basename "$GITHUB_WORKSPACE")"

      - name: Create .env File
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > /tmp/.env

      - name: Remove carriage returns from setup.sh
        run: sed -i 's/\r$//' setup.sh

      - name: Run Setup Script
        run: |
          sudo sh setup.sh "${{ secrets.DB_NAME }}" "${{ secrets.DEV_DB_NAME }}" "${{ secrets.TEST_DB_NAME }}" \
          "${{ secrets.DB_USER }}" "${{ secrets.DB_PASSWORD }}" "${{ secrets.APP_GROUP }}" "${{ secrets.APP_USER }}"

      - name: Run Tests
        run: npm test