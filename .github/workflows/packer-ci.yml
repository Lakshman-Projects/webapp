name: Packer CI for Pull Requests

on:
  pull_request:
    branches:
      - main

jobs:
  packer-checks:
    name: Packer Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Packer
      uses: hashicorp/setup-packer@v2
      with:
        version: 'latest'

    - name: Initialize Packer
      run: packer init ./packer/machine-image.pkr.hcl

    - name: Run `packer fmt`
      run: |
        packer fmt -check ./packer/machine-image.pkr.hcl

    - name: Run `packer validate`
      run: |
        packer validate -syntax-only ./packer/machine-image.pkr.hcl
